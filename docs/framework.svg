<svg width="100%" viewBox="0 0 760 940" role="img" xmlns="http://www.w3.org/2000/svg">
<title>私域专家团 v0.4.0 结构化 Runtime 架构图</title>
<desc>用户请求先进入统一入口和结构化 Runtime，生成 Task、RouteDecision 与风险信息；随后只选择执行、问诊或全盘评审中的一条路径。全盘评审通过白名单上下文隔离四官，团长收口后进入质量门。底层由原子状态、脱敏追踪、知识库和本地连接器支撑。</desc>
<defs>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
    <path d="M0,0 L7,3 L0,6 Z" fill="#77766F"/>
  </marker>
  <style>
    text{font-family:'PingFang SC','Microsoft YaHei',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .title{fill:#171715;font-weight:650}
    .muted{fill:#68675F}
    .line{stroke:#77766F;stroke-width:1.6;fill:none}
    .dash{stroke:#A7A49A;stroke-width:1.2;stroke-dasharray:5 5;fill:none}
    .blue rect{fill:#EAF2FF;stroke:#3973B7;stroke-width:1.5}
    .blue text{fill:#204F83}
    .teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:1.5}
    .teal text{fill:#085041}
    .violet rect{fill:#F0ECFA;stroke:#7453A6;stroke-width:1.5}
    .violet text{fill:#503679}
    .coral rect{fill:#FAECE7;stroke:#B34E2B;stroke-width:1.5}
    .coral text{fill:#7A3118}
    .gray rect{fill:#F4F2EC;stroke:#9A988F;stroke-width:1.3}
    .gray text{fill:#44433E}
  </style>
</defs>

