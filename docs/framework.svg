<svg width="100%" viewBox="0 0 680 744" role="img" xmlns="http://www.w3.org/2000/svg">
<title>私域专家团框架全局图</title>
<desc>从上到下的流程：客户私域诉求输入，团长调研路由，并行派公关官、产品官、广告官、合规官四官独立评审，团长主持收口，过质量门后产出可落地 playbook；底部是知识库三层与工具链两层底座，贯穿全程。</desc>
<defs>
<marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#888780"/></marker>
<style>
text{font-family:'PingFang SC','Microsoft YaHei',-apple-system,Helvetica,Arial,sans-serif}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:1.5}
.c-teal text{fill:#085041}
.c-coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:1.5}
.c-coral text{fill:#712B13}
.c-gray rect{fill:#F1EFE8;stroke:#9A988F;stroke-width:1.5}
.c-gray text{fill:#44433E}
</style>
</defs>

